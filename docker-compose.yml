version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: manga_postgres
    environment:
      POSTGRES_DB: manga_db
      POSTGRES_USER: Angelock
      POSTGRES_PASSWORD: 415263
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: manga_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@manga.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

volumes:
  pgdata: